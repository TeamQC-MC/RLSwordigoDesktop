app-id: com.quantumcreeperlabs.Swordigo
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: swordigo_boot
rename-icon: swordigo
finish-args:
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
modules:
  - name: unicorn
    buildsystem: cmake
    sources:
      - type: git
        url: https://github.com/unicorn-engine/unicorn.git
        tag: 2.0.1

  - name: swordigo
    buildsystem: cmake
    subdir: builder
    sources:
      - type: dir
        path: ../..
